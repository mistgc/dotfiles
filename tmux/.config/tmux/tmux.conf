#######################
# Options
#######################
set -g prefix C-s
set -g default-terminal "tmux-256color"
set -g mouse on
set -sg escape-time 0
unbind C-b

#######################
# Keybinds
#######################
bind-key -T prefix C-s send-prefix

unbind-key -T copy-mode-vi l
unbind-key -T copy-mode-vi L

bind-key -T prefix h select-pane -L
bind-key -T prefix n select-pane -D
bind-key -T prefix e select-pane -U
bind-key -T prefix i select-pane -R

bind-key -T prefix k next-window

bind-key -T prefix -r M-h resize-pane -L 5
bind-key -T prefix -r M-n resize-pane -D 5
bind-key -T prefix -r M-e resize-pane -U 5
bind-key -T prefix -r M-i resize-pane -R 5

bind-key -T copy-mode-vi h send-keys -X cursor-left
bind-key -T copy-mode-vi n send-keys -X cursor-down
bind-key -T copy-mode-vi e send-keys -X cursor-up
bind-key -T copy-mode-vi i send-keys -X cursor-right

bind-key -T copy-mode-vi H send-keys -X top-line
bind-key -T copy-mode-vi N send-keys -X scroll-down
bind-key -T copy-mode-vi E send-keys -X scroll-up
bind-key -T copy-mode-vi I send-keys -X bottom-line

bind-key -T copy-mode-vi j send-keys -X next-word-end
bind-key -T copy-mode-vi J send-keys -X next-space-end

bind-key -T copy-mode-vi k send-keys -X search-again
bind-key -T copy-mode-vi K send-keys -X search-reverse

bind-key -T prefix r source-file ~/.config/tmux/tmux.conf \; display "Reloaded!"

#######################
# Plugins
#######################
set -g @plugin 'tmux-plugins/tpm'
set -g @plugin 'tmux-plugins/tmux-sensible'

run '~/.config/tmux/plugins/tpm/tpm'
